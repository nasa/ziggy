// Generate XML schemas.
task generateXmlSchemas(type: JavaExec, dependsOn: copyLibs) {
    outputs.dir "$buildDir/schema/xml"

    mainClass.set("gov.nasa.ziggy.pipeline.xml.XmlSchemaExporter")
    classpath files(sourceSets.main.runtimeClasspath)
    jvmArgs "-Djava.library.path=$buildDir/lib", "-Dziggy.build.dir=$buildDir"
    args "gov.nasa.ziggy.data.management.Acknowledgement",
        "gov.nasa.ziggy.data.management.Manifest",
        "gov.nasa.ziggy.pipeline.definition.ModelRegistry",
        "gov.nasa.ziggy.pipeline.definition.importer.PipelineDefinitionFile"

    logging.captureStandardOutput LogLevel.INFO
}

test.dependsOn generateXmlSchemas
integrationTest.dependsOn generateXmlSchemas
assemble.dependsOn generateXmlSchemas
